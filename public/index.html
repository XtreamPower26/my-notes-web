<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteNest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f; --surface: #1a1a1c; --card: #222226;
    --accent: #f5c542; --text: #f0ede8; --muted: #888; --border: #2e2e33;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* AUTH */
  .auth-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:36px 28px; width:100%; max-width:380px; }
  .auth-box h1 { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:6px; }
  .auth-box h1 span { color:var(--accent); }
  .auth-box p { color:var(--muted); font-size:0.88rem; margin-bottom:28px; }
  .tabs { display:flex; gap:4px; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:24px; }
  .tab { flex:1; padding:9px; border:none; border-radius:7px; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.2s; }
  .tab.active { background:var(--accent); color:#111; font-weight:500; }
  .inp { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.93rem; outline:none; margin-bottom:12px; transition:border-color 0.2s; }
  .inp:focus { border-color:var(--accent); }
  .inp::placeholder { color:var(--muted); }
  .btn-primary { width:100%; background:var(--accent); color:#111; border:none; border-radius:10px; padding:13px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.95rem; cursor:pointer; transition:opacity 0.15s; margin-top:4px; }
  .btn-primary:hover { opacity:0.88; }
  .err { color:#e05555; font-size:0.82rem; margin-top:8px; min-height:18px; }

  /* APP */
  .app-wrap { display:none; }
  header { position:sticky; top:0; z-index:100; background:rgba(14,14,15,0.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 20px; height:60px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Playfair Display',serif; font-size:1.3rem; }
  .logo span { color:var(--accent); }
  .user-info { display:flex; align-items:center; gap:10px; }
  .username { font-size:0.82rem; color:var(--muted); }
  .btn-logout { background:transparent; border:1px solid var(--border); border-radius:7px; padding:6px 12px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.8rem; cursor:pointer; }
  .btn-logout:hover { border-color:var(--text); color:var(--text); }
  .container { max-width:960px; margin:0 auto; padding:28px 16px 80px; }

  /* CREATE */
  .create-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:28px; transition:border-color 0.2s; }
  .create-box:focus-within { border-color:var(--accent); }
  .create-box input { width:100%; background:transparent; border:none; outline:none; font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); margin-bottom:10px; }
  .create-box input::placeholder { color:var(--muted); }
  .create-box textarea { width:100%; background:transparent; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:0.93rem; color:var(--text); resize:none; min-height:80px; line-height:1.6; }
  .create-box textarea::placeholder { color:var(--muted); }
  .create-footer { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); flex-wrap:wrap; gap:8px; }
  .colors { display:flex; gap:7px; }
  .cdot { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s; }
  .cdot:hover, .cdot.active { transform:scale(1.2); border-color:white; }
  .btn-save { background:var(--accent); color:#111; border:none; border-radius:8px; padding:8px 18px; font-family:'DM Sans',sans-serif; font-weight:500; font-size:0.85rem; cursor:pointer; }

  /* SEARCH */
  .search-wrap { position:relative; margin-bottom:20px; }
  .search-wrap svg { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .search-inp { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px 10px 40px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.88rem; outline:none; }
  .search-inp:focus { border-color:var(--accent); }
  .search-inp::placeholder { color:var(--muted); }

  /* NOTES */
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .section-title { font-family:'Playfair Display',serif; font-size:1.6rem; }
  .note-count { font-size:0.8rem; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:3px 9px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
  .note-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; position:relative; transition:transform 0.18s,box-shadow 0.18s; animation:fadeIn 0.3s ease; overflow:hidden; }
  .note-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--nc,#f5c542); border-radius:14px 14px 0 0; }
  .note-card:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,0.3); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .note-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:8px; }
  .note-body { font-size:0.85rem; color:#aaa; line-height:1.6; max-height:100px; overflow:hidden; white-space:pre-wrap; word-break:break-word; }
  .note-footer { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:10px; border-top:1px solid var(--border); }
  .note-date { font-size:0.72rem; color:var(--muted); }
  .note-btns { display:flex; gap:6px; opacity:0; transition:opacity 0.15s; }
  .note-card:hover .note-btns { opacity:1; }
  .ic-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:3px; border-radius:5px; font-size:0.8rem; }
  .ic-btn:hover { background:var(--border); }
  .empty { text-align:center; padding:60px 20px; grid-column:1/-1; color:var(--muted); }
  .empty-icon { font-size:2.5rem; margin-bottom:12px; opacity:0.4; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; width:100%; max-width:500px; }
  .modal h2 { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:16px; }
  .modal input, .modal textarea { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px 13px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; margin-bottom:10px; }
  .modal textarea { resize:vertical; min-height:120px; line-height:1.6; }
  .modal input:focus, .modal textarea:focus { border-color:var(--accent); }
  .modal input::placeholder, .modal textarea::placeholder { color:var(--muted); }
  .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:6px; }
  .btn-cancel { background:transparent; border:1px solid var(--border); border-radius:8px; padding:8px 16px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:0.85rem; z-index:300; opacity:0; transition:all 0.25s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:600px) { .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <h1>Note<span>Nest</span></h1>
    <p>তোমার নোটস, শুধু তোমার জন্য</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">লগইন</button>
      <button class="tab" onclick="switchTab('register')">নিবন্ধন</button>
    </div>
    <input class="inp" id="authUser" type="text" placeholder="ব্যবহারকারীর নাম..." />
    <input class="inp" id="authPass" type="password" placeholder="পাসওয়ার্ড..." />
    <div class="err" id="authErr"></div>
    <button class="btn-primary" id="authBtn" onclick="doAuth()">লগইন করো</button>
  </div>
</div>

<!-- APP -->
<div class="app-wrap" id="appWrap">
  <header>
    <div class="logo">Note<span>Nest</span></div>
    <div class="user-info">
      <span class="username" id="headerUser"></span>
      <button class="btn-logout" onclick="logout()">লগআউট</button>
    </div>
  </header>

  <div class="container">
    <!-- CREATE -->
    <div class="create-box">
      <input type="text" id="newTitle" placeholder="নোটের শিরোনাম..." maxlength="80" />
      <textarea id="newBody" placeholder="এখানে লেখো..."></textarea>
      <div class="create-footer">
        <div class="colors" id="colorPicker"></div>
        <button class="btn-save" onclick="saveNote()">সেভ করো</button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-inp" type="text" id="searchInp" placeholder="নোট খোঁজো..." oninput="renderNotes()" />
    </div>

    <div class="section-header">
      <h2 class="section-title">আমার নোটস</h2>
      <span class="note-count" id="noteCount">০টি</span>
    </div>

    <div class="grid" id="notesGrid"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <h2>নোট সম্পাদনা</h2>
    <input type="text" id="editTitle" placeholder="শিরোনাম..." />
    <textarea id="editBody" placeholder="বিষয়বস্তু..."></textarea>
    <div class="colors" id="editColors" style="margin-bottom:12px"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
      <button class="btn-save" onclick="updateNote()">আপডেট</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#f5c542','#e8844a','#6ecf8e','#5b9cf6','#d473d4','#f06292'];
let selColor = COLORS[0], editColor = COLORS[0], editId = null, currentTab = 'login';
let allNotes = [];

function buildColors(id, onSelect, init) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cdot' + (c === init ? ' active' : '');
    d.style.background = c;
    d.onclick = () => { el.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active')); d.classList.add('active'); onSelect(c); };
    el.appendChild(d);
  });
}

buildColors('colorPicker', c => selColor = c, selColor);

// AUTH
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('authBtn').textContent = tab === 'login' ? 'লগইন করো' : 'নিবন্ধন করো';
  document.getElementById('authErr').textContent = '';
}

async function doAuth() {
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  if (!username || !password) { document.getElementById('authErr').textContent = 'সব তথ্য দাও'; return; }
  const res = await fetch(`/${currentTab}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
  const data = await res.json();
  if (data.error) { document.getElementById('authErr').textContent = data.error; return; }
  showApp(username);
}

function showApp(username) {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  document.getElementById('headerUser').textContent = username;
  loadNotes();
}

async function logout() {
  await fetch('/logout', { method:'POST' });
  document.getElementById('authWrap').style.display = 'flex';
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
}

// NOTES
async function loadNotes() {
  const res = await fetch('/api/notes');
  allNotes = await res.json();
  renderNotes();
}

function renderNotes() {
  const search = document.getElementById('searchInp').value.toLowerCase();
  let notes = allNotes;
  if (search) notes = notes.filter(n => n.title.toLowerCase().includes(search) || n.body.toLowerCase().includes(search));
  document.getElementById('noteCount').textContent = `${notes.length}টি`;
  const grid = document.getElementById('notesGrid');
  if (!notes.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><p>${search?'কিছু পাওয়া যায়নি':'এখনো কোনো নোট নেই!'}</p></div>`;
    return;
  }
  grid.innerHTML = notes.map(n => `
    <div class="note-card" style="--nc:${n.color||'#f5c542'}">
      <div class="note-title">${esc(n.title)}</div>
      <div class="note-body">${esc(n.body)}</div>
      <div class="note-footer">
        <span class="note-date">${new Date(n.date).toLocaleDateString('bn-BD',{day:'numeric',month:'short',year:'numeric'})}</span>
        <div class="note-btns">
          <button class="ic-btn" onclick="openEdit('${n._id}')" title="সম্পাদনা">✏️</button>
          <button class="ic-btn" onclick="deleteNote('${n._id}')" title="মুছুন">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function saveNote() {
  const title = document.getElementById('newTitle').value.trim();
  const body = document.getElementById('newBody').value.trim();
  if (!title && !body) { showToast('কিছু লেখো আগে!'); return; }
  await fetch('/api/notes', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:title||'শিরোনামহীন',body,color:selColor}) });
  document.getElementById('newTitle').value = '';
  document.getElementById('newBody').value = '';
  await loadNotes();
  showToast('নোট সেভ হয়েছে ✓');
}

function openEdit(id) {
  const note = allNotes.find(n => n._id === id);
  if (!note) return;
  editId = id; editColor = note.color || COLORS[0];
  document.getElementById('editTitle').value = note.title;
  document.getElementById('editBody').value = note.body;
  buildColors('editColors', c => editColor = c, editColor);
  document.getElementById('editModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('editModal').classList.add('hidden'); editId = null; }

async function updateNote() {
  const title = document.getElementById('editTitle').value.trim();
  const body = document.getElementById('editBody').value.trim();
  await fetch(`/api/notes/${editId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:title||'শিরোনামহীন',body,color:editColor}) });
  closeModal();
  await loadNotes();
  showToast('আপডেট হয়েছে ✓');
}

async function deleteNote(id) {
  if (!confirm('মুছে ফেলবে?')) return;
  await fetch(`/api/notes/${id}`, { method:'DELETE' });
  await loadNotes();
  showToast('মুছে ফেলা হয়েছে');
}

function esc(s='') { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Check session on load
fetch('/api/me').then(r=>r.json()).then(d => { if(d.loggedIn) showApp(d.username); });

document.getElementById('editModal').addEventListener('click', e => { if(e.target===document.getElementById('editModal')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('authPass').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shifat Notes Idea</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --card: #12121c;
    --card2: #171724;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #f59e0b;
    --glow: rgba(124,58,237,0.35);
    --glow2: rgba(168,85,247,0.2);
    --text: #f0eeff;
    --muted: #6b6b8a;
    --border: #1e1e30;
    --border2: #2a2a42;
    --danger: #ef4444;
    --success: #10b981;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(124,58,237,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(168,85,247,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(245,158,11,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* WELCOME BANNER */
  .welcome-banner {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,58,237,0.08) 0%, transparent 100%);
  }

  .welcome-tag {
    display: inline-block;
    font-family: 'Orbitron', monospace;
    font-size: 0.62rem;
    letter-spacing: 4px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 4px 14px;
    border: 1px solid rgba(168,85,247,0.3);
    border-radius: 999px;
    background: rgba(124,58,237,0.1);
  }

  .welcome-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 5vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* PARTICLES */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--accent2);
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* AUTH PAGE */
  .auth-wrap {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 140px);
    padding: 20px;
  }

  .auth-box {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(124,58,237,0.15), 0 20px 60px rgba(0,0,0,0.5);
  }

  .auth-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .auth-logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 1.5rem;
    box-shadow: 0 0 24px var(--glow);
  }

  .auth-logo h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 14px var(--glow);
  }

  /* INPUT */
  .inp-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .inp-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .inp {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    outline: none;
    transition: all 0.2s;
  }

  .inp:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  .inp::placeholder { color: var(--muted); }

  .pass-wrap { position: relative; }
  .pass-wrap .inp { padding-right: 46px; }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }

  .eye-btn:hover { color: var(--accent2); }

  .err {
    color: var(--danger);
    font-size: 0.8rem;
    margin-bottom: 12px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 20px var(--glow);
    margin-top: 6px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px var(--glow); }
  .btn-primary:active { transform: translateY(0); }

  /* APP */
  .app-wrap { display: none; position: relative; z-index: 10; }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(5,5,8,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    box-shadow: 0 0 14px var(--glow);
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: linear-gradient(90deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 999px;
    padding: 6px 14px 6px 8px;
  }

  .user-avatar {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .user-name { font-size: 0.8rem; color: var(--text); }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 7px 13px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* CONTAINER */
  .container { max-width: 960px; margin: 0 auto; padding: 28px 16px 80px; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
  }

  .stat-chip span:first-child { font-size: 1rem; }
  .stat-num { color: var(--accent2); font-weight: 600; }
  .stat-label { color: var(--muted); }

  /* CREATE BOX */
  .create-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 28px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .create-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .create-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .create-box:focus-within::before { opacity: 1; }

  .create-box input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 12px;
  }

  .create-box input::placeholder { color: var(--muted); }

  .create-box textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    resize: none;
    min-height: 80px;
    line-height: 1.7;
  }

  .create-box textarea::placeholder { color: var(--muted); }

  .create-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .colors { display: flex; gap: 7px; align-items: center; }

  .cdot {
    width: 20px; height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }

  .cdot:hover, .cdot.active { transform: scale(1.25); border-color: white; box-shadow: 0 0 8px currentColor; }

  .btn-save {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px var(--glow);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 22px; }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .search-inp {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 12px 16px 12px 42px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.2s;
  }

  .search-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .search-inp::placeholder { color: var(--muted); }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .note-count {
    font-size: 0.78rem;
    color: var(--accent2);
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'Orbitron', monospace;
  }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }

  /* NOTE CARD */
  .note-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease both;
    overflow: hidden;
    cursor: default;
  }

  .note-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--nc, var(--accent));
    border-radius: 16px 16px 0 0;
  }

  .note-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(124,58,237,0.06), transparent 60%);
    pointer-events: none;
  }

  .note-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--border2);
    border-color: var(--border2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .note-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    margin-bottom: 9px;
    word-break: break-word;
  }

  .note-body {
    font-size: 0.84rem;
    color: #8888aa;
    line-height: 1.65;
    max-height: 100px;
    overflow: hidden;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }

  .note-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .note-date { font-size: 0.72rem; color: var(--muted); font-family: 'Orbitron', monospace; letter-spacing: 0.5px; }

  .note-btns { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
  .note-card:hover .note-btns { opacity: 1; }

  .ic-btn {
    background: var(--card2);
    border: 1px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 7px;
    font-size: 0.78rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
  }

  .ic-btn.edit:hover { border-color: var(--accent2); color: var(--accent2); }
  .ic-btn.del:hover { border-color: var(--danger); color: var(--danger); }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    grid-column: 1/-1;
  }

  .empty-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.35; }
  .empty p { color: var(--muted); font-size: 0.9rem; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(8px);
    animation: fadeOverlay 0.2s ease;
  }

  @keyframes fadeOverlay { from{opacity:0} to{opacity:1} }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 26px;
    width: 100%;
    max-width: 500px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(124,58,237,0.2);
    animation: slideUp 0.25s ease;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal h2 {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: 2px;
    color: var(--accent2);
    margin-bottom: 18px;
    text-transform: uppercase;
  }

  .modal input, .modal textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 12px;
    transition: all 0.2s;
  }

  .modal input:focus, .modal textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
  .modal input::placeholder, .modal textarea::placeholder { color: var(--muted); }
  .modal textarea { resize: vertical; min-height: 120px; line-height: 1.6; }

  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 9px;
    padding: 9px 16px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text); color: var(--text); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 11px 20px;
    font-size: 0.85rem;
    z-index: 300;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media(max-width:600px) {
    .grid { grid-template-columns: 1fr; }
    .auth-box { padding: 28px 20px; }
    .welcome-title { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- WELCOME BANNER -->
<div class="welcome-banner">
  <div class="welcome-tag">✦ Premium Notes Experience ✦</div>
  <div class="welcome-title">WELCOME TO SHIFAT NOTES IDEA</div>
  <div class="welcome-sub">তোমার চিন্তা, তোমার জগৎ — সুরক্ষিত ও একান্ত তোমার</div>
</div>

<!-- AUTH -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">✦</div>
      <h2>SHIFAT NOTES</h2>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">লগইন</button>
      <button class="tab" onclick="switchTab('register')">নিবন্ধন</button>
    </div>

    <div class="inp-wrap">
      <label class="inp-label">ব্যবহারকারীর নাম</label>
      <input class="inp" id="authUser" type="text" placeholder="তোমার নাম লেখো..." />
    </div>

    <div class="inp-wrap">
      <label class="inp-label">পাসওয়ার্ড</label>
      <div class="pass-wrap">
